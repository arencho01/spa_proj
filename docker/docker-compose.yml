version: '3.1'
services:
   mysql:
      image: 'mysql:8.0'
      container_name: mysql
      volumes:
         - ./backend/src/config:/etc/mysql/conf.d
         - mysql_data:/var/lib/mysql
      environment:
         - MYSQL_ROOT_PASSWORD=12345
         - MYSQL_DATABASE=my_db
      ports:
         - '3306:3306'

   php-fpm:
      image: php:8.3-fpm
      container_name: php-fpm
      volumes:
         - ./backend/src:/var/www/html
      depends_on:
         -  mysql

   webserver:
      image: 'nginx:alpine'
      container_name: nginx
      volumes:
         - './frontend:/usr/share/nginx/html'
         - './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf'
      ports:
         - '8080:80'
      depends_on:
         - php-fpm
networks:
   app-network:
      driver: bridge




